<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>数学动态课件库</title>
<style>
  /* ===== 设计令牌（shadcn 风格，纯 CSS 实现，保持 file:// 零构建直开）===== */
  :root {
    --bg: #f4f6fa;
    --card: #ffffff;
    --border: #e2e8f0;
    --ink: #0f172a;
    --muted: #64748b;
    --faint: #94a3b8;
    --primary: #2563eb;
    --primary-hover: #1d4ed8;
    --primary-soft: #dbeafe;
    --side-from: #0b1220;
    --side-to: #14224a;
    --radius: 14px;
    --shadow: 0 1px 3px rgba(15, 23, 42, .06), 0 1px 2px rgba(15, 23, 42, .04);
    --shadow-lg: 0 8px 24px rgba(15, 23, 42, .10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg); color: var(--ink); display: flex; min-height: 100vh;
  }
  ::selection { background: var(--primary-soft); }

  /* ===== 左侧深色边栏 ===== */
  aside {
    width: 236px; flex: 0 0 236px; position: relative; overflow: hidden;
    background: linear-gradient(175deg, var(--side-from) 0%, var(--side-to) 100%);
    color: #cbd5e1; padding: 26px 16px 150px; display: flex; flex-direction: column; gap: 6px;
  }
  aside .side-sec {
    font-size: 15px; font-weight: 700; color: #f1f5f9;
    margin: 6px 4px 10px; letter-spacing: .5px;
  }
  aside .side-sec + .side-sec { margin-top: 18px; }
  .side-btn {
    display: flex; align-items: center; gap: 10px; width: 100%;
    padding: 11px 14px; border: 0; border-radius: 11px; cursor: pointer;
    background: rgba(148, 163, 184, .10); color: #e2e8f0;
    font-size: 15px; font-weight: 600; text-align: left;
    transition: background .15s, transform .05s;
  }
  .side-btn:hover { background: rgba(148, 163, 184, .20); }
  .side-btn:active { transform: scale(.985); }
  .side-btn.active {
    background: var(--primary); color: #fff;
    box-shadow: 0 4px 14px rgba(37, 99, 235, .45);
  }
  .side-btn.disabled {
    opacity: .42; cursor: not-allowed;
  }
  .side-btn.disabled:hover { background: rgba(148, 163, 184, .10); }
  .side-btn .ico { width: 19px; height: 19px; flex: 0 0 19px; opacity: .9; }
  .side-btn .badge {
    margin-left: auto; font-size: 11.5px; font-weight: 700;
    background: rgba(255, 255, 255, .18); border-radius: 99px; padding: 2px 8px;
  }
  .side-group { display: flex; flex-direction: column; gap: 7px; }
  /* 侧栏底部数学涂鸦 */
  aside .doodle {
    position: absolute; left: 0; right: 0; bottom: 0; height: 150px;
    opacity: .35; pointer-events: none;
  }

  /* ===== 右侧主区 ===== */
  main { flex: 1; min-width: 0; padding: 30px 36px 70px; }
  .topbar { display: flex; align-items: flex-start; justify-content: space-between; gap: 28px; }
  .topbar h1 { font-size: 30px; letter-spacing: 1px; }
  .topbar .tagline { color: var(--muted); margin-top: 8px; font-size: 14.5px; letter-spacing: .5px; }
  .search {
    flex: 0 1 460px; display: flex; align-items: center; gap: 10px;
    background: var(--card); border: 1px solid var(--border); border-radius: 13px;
    padding: 12px 16px; box-shadow: var(--shadow);
    transition: border-color .15s, box-shadow .15s;
  }
  .search:focus-within { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }
  .search svg { width: 18px; height: 18px; flex: 0 0 18px; color: var(--faint); }
  .search input {
    border: 0; outline: 0; flex: 1; font-size: 14.5px; color: var(--ink); background: transparent;
  }
  .search input::placeholder { color: var(--faint); }

  .cols { display: grid; grid-template-columns: 268px minmax(0, 1fr); gap: 26px; margin-top: 30px; }
  .col-title { font-size: 17px; font-weight: 700; margin-bottom: 14px; }

  /* ===== 章节导航 ===== */
  .chapter-item {
    display: flex; align-items: center; gap: 12px; width: 100%;
    background: var(--card); border: 1.5px solid var(--border); border-radius: 12px;
    padding: 12px 14px; margin-bottom: 10px; cursor: pointer;
    font-size: 15px; font-weight: 600; color: var(--ink); text-align: left;
    box-shadow: var(--shadow); transition: border-color .15s, background .15s;
  }
  .chapter-item:hover { border-color: #c7d5f2; }
  .chapter-item.active {
    border-color: var(--primary); background: #eff4ff; color: var(--primary);
  }
  .chapter-item .num {
    width: 26px; height: 26px; flex: 0 0 26px; border-radius: 50%;
    background: #eef2f7; color: var(--muted); font-size: 13.5px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .chapter-item.active .num { background: var(--primary); color: #fff; }
  .chapter-item .arrow { margin-left: auto; color: var(--faint); font-size: 15px; }
  .chapter-item.active .arrow { color: var(--primary); }
  .chapter-item .cnt {
    margin-left: auto; font-size: 11.5px; color: var(--faint); font-weight: 600;
  }
  .chapter-item .cnt.some { color: var(--primary); }
  .chapter-item .arrow { margin-left: 8px; }

  /* ===== 课件卡片 ===== */
  .lesson-card {
    display: flex; gap: 18px; background: var(--card);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px; margin-bottom: 16px; box-shadow: var(--shadow);
    transition: box-shadow .18s, transform .18s;
  }
  .lesson-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-1px); }
  .thumb {
    width: 196px; height: 128px; flex: 0 0 196px; border-radius: 11px; overflow: hidden;
  }
  .thumb svg { width: 100%; height: 100%; display: block; }
  .lc-body { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .lc-title { font-size: 17.5px; font-weight: 700; line-height: 1.35; }
  .lc-desc {
    color: var(--muted); font-size: 13.5px; margin-top: 6px; line-height: 1.55;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .lc-from { color: var(--faint); font-size: 12px; margin-top: 4px; }
  .pills { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 9px; }
  .pill {
    font-size: 12px; font-weight: 700; border-radius: 7px; padding: 3px 9px; line-height: 1.5;
  }
  .pill.blue   { background: #dbeafe; color: #1d4ed8; }
  .pill.green  { background: #dcfce7; color: #15803d; }
  .pill.orange { background: #ffedd5; color: #c2410c; }
  .pill.purple { background: #f3e8ff; color: #7e22ce; }
  .pill.teal   { background: #ccfbf1; color: #0f766e; }
  .pill.gray   { background: #f1f5f9; color: #64748b; }
  .lc-meta {
    display: flex; align-items: center; flex-wrap: wrap; gap: 16px;
    color: var(--muted); font-size: 13px; margin-top: auto; padding-top: 10px;
  }
  .lc-meta span { display: inline-flex; align-items: center; gap: 5px; }
  .lc-meta svg { width: 15px; height: 15px; color: var(--faint); }
  .lc-side {
    display: flex; flex-direction: column; align-items: flex-end;
    justify-content: space-between; flex: 0 0 auto; padding: 2px 2px 0 0;
  }
  .fav-btn {
    border: 0; background: transparent; cursor: pointer; padding: 4px;
    color: #cbd5e1; transition: color .15s, transform .1s;
  }
  .fav-btn:hover { color: #f59e0b; transform: scale(1.12); }
  .fav-btn.on { color: #f59e0b; }
  .fav-btn svg { width: 21px; height: 21px; display: block; }
  .start-btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--primary); color: #fff; text-decoration: none;
    font-size: 14.5px; font-weight: 700; border-radius: 10px; padding: 10px 20px;
    box-shadow: 0 4px 12px rgba(37, 99, 235, .35);
    transition: background .15s, transform .05s;
  }
  .start-btn:hover { background: var(--primary-hover); }
  .start-btn:active { transform: scale(.97); }
  .start-btn.off {
    background: #e2e8f0; color: var(--faint); box-shadow: none;
    cursor: not-allowed; pointer-events: none;
  }
  .start-btn svg { width: 14px; height: 14px; }
  .empty {
    background: var(--card); border: 1.5px dashed var(--border); border-radius: var(--radius);
    color: var(--faint); font-size: 14.5px; text-align: center; padding: 52px 20px;
  }
  .result-hint { color: var(--muted); font-size: 13.5px; margin: -4px 0 14px; }

  @media (max-width: 1120px) {
    .cols { grid-template-columns: 1fr; }
    .thumb { width: 150px; height: 104px; flex-basis: 150px; }
  }
  @media (max-width: 860px) {
    aside { display: none; }
    .topbar { flex-direction: column; }
    .search { width: 100%; flex-basis: auto; }
  }
</style>
</head>
<body>
  <aside>
    <div class="side-sec">选择学段</div>
    <div class="side-group" id="stage-list"></div>
    <div class="side-sec">选择年级</div>
    <div class="side-group" id="book-list"></div>
    <svg class="doodle" viewBox="0 0 236 150" fill="none" stroke="#7c93c4" stroke-width="1.3">
      <path d="M14 118 L14 62 M8 112 L14 118 L20 112 M14 62 L70 62 M64 56 L70 62 M64 68 L70 62"/>
      <path d="M22 96 C 34 70, 50 70, 62 96" />
      <text x="40" y="52" fill="#7c93c4" font-size="11" stroke="none">y = ax + b</text>
      <circle cx="196" cy="60" r="22"/>
      <path d="M196 38 L196 82 M174 60 L218 60"/>
      <path d="M92 128 L128 128 L128 96 Z"/>
      <text x="96" y="144" fill="#7c93c4" font-size="11" stroke="none">a² + b² = c²</text>
      <text x="158" y="120" fill="#7c93c4" font-size="12" stroke="none">∫ π √2 Σ</text>
    </svg>
  </aside>
  <main>
    <div class="topbar">
      <div>
        <h1>数学动态课件库</h1>
        <p class="tagline">动态演示 · 抽象可视 · 突破难点 · 提升效率</p>
      </div>
      <label class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M20 20 L16.2 16.2"/></svg>
        <input id="q" type="text" placeholder="搜索课件标题、知识点或关键词..." autocomplete="off">
      </label>
    </div>
    <div class="cols">
      <nav>
        <div class="col-title">章节导航</div>
        <div id="chapter-list"></div>
      </nav>
      <section>
        <div class="col-title">课件列表</div>
        <div id="result-hint" class="result-hint" style="display:none"></div>
        <div id="lesson-list"></div>
      </section>
    </div>
  </main>

<script src="courses.js"></script>
<script>
(function () {
  'use strict';
  var DATA = window.COURSES;
  var $stage = document.getElementById('stage-list');
  var $book = document.getElementById('book-list');
  var $chap = document.getElementById('chapter-list');
  var $less = document.getElementById('lesson-list');
  var $hint = document.getElementById('result-hint');
  var $q = document.getElementById('q');

  /* ---------- 状态 ---------- */
  var state = { stage: 'junior', book: 'grade7b', chapter: null, q: '' };
  var FKEY = 'cw-favs';
  var favs = [];
  try { favs = JSON.parse(localStorage.getItem(FKEY) || '[]'); } catch (e) { favs = []; }

  function findStage(id) {
    var i;
    for (i = 0; i < DATA.stages.length; i++) if (DATA.stages[i].id === id) return DATA.stages[i];
    return null;
  }
  function findBook(st, id) {
    var i;
    for (i = 0; i < st.books.length; i++) if (st.books[i].id === id) return st.books[i];
    return null;
  }
  function doneCount(ch) {
    var n = 0, i, ls = ch.lessons || [];
    for (i = 0; i < ls.length; i++) if (ls[i].status === 'done') n++;
    return n;
  }
  function bookDone(bk) {
    var n = 0, i;
    for (i = 0; i < bk.chapters.length; i++) n += doneCount(bk.chapters[i]);
    return n;
  }
  function stepsOf(l) {
    var n = 0, i;
    for (i = 0; i < (l.expectSteps || []).length; i++) n += l.expectSteps[i];
    return n;
  }

  /* ---------- 课型推断与缩略图 ---------- */
  function lessonKind(title) {
    if (/复习|小结/.test(title)) return { name: '复习课', cls: 'purple' };
    if (/探究|活动|阅读|实践|设计|错觉|观察/.test(title)) return { name: '探究课', cls: 'orange' };
    if (/应用|实际问题|综合/.test(title)) return { name: '应用课', cls: 'teal' };
    return { name: '新授课', cls: 'blue' };
  }

  var THUMB_BG = [
    ['#eff6ff', '#dbeafe'], ['#f0fdf4', '#dcfce7'], ['#fff7ed', '#ffedd5'],
    ['#faf5ff', '#f3e8ff'], ['#f0fdfa', '#ccfbf1'], ['#fffbeb', '#fef3c7'],
  ];
  function thumbSVG(chapterId, seed) {
    var bg = THUMB_BG[seed % THUMB_BG.length];
    var head = '<svg viewBox="0 0 200 130" xmlns="http://www.w3.org/2000/svg">' +
      '<defs><linearGradient id="g' + seed + '" x1="0" y1="0" x2="1" y2="1">' +
      '<stop offset="0" stop-color="' + bg[0] + '"/><stop offset="1" stop-color="' + bg[1] + '"/>' +
      '</linearGradient></defs>' +
      '<rect width="200" height="130" fill="url(#g' + seed + ')"/>';
    var art = '';
    if (/ch03|ch08/.test(chapterId) && /ch03/.test(chapterId)) {
      art = '<path d="M100 34 L100 44 M60 44 L140 44 M60 44 L52 72 L68 72 Z M140 44 L132 72 L148 72 Z" stroke="#475569" stroke-width="3" fill="none"/>' +
        '<path d="M74 96 L126 96 L118 108 L82 108 Z" fill="#94a3b8"/>' +
        '<rect x="44" y="52" width="16" height="14" fill="#4ade80"/><text x="52" y="63" font-size="10" text-anchor="middle" fill="#14532d">x</text>' +
        '<rect x="124" y="52" width="16" height="14" fill="#f87171"/><text x="132" y="63" font-size="10" text-anchor="middle" fill="#7f1d1d">5</text>';
    } else if (/ch05/.test(chapterId)) {
      art = '<path d="M30 52 L170 52 M30 84 L170 84" stroke="#2563eb" stroke-width="3.5"/>' +
        '<path d="M56 110 L144 26" stroke="#e64a19" stroke-width="3"/>' +
        '<path d="M96 52 A14 14 0 0 0 110 66" stroke="#16a34a" stroke-width="2.5" fill="none"/>';
    } else if (/ch06/.test(chapterId)) {
      art = '<path d="M24 92 L176 92" stroke="#475569" stroke-width="2.5"/>' +
        '<path d="M46 92 L46 50 L88 50 L88 92 M46 50 L88 92" stroke="#2563eb" stroke-width="2.6" fill="none"/>' +
        '<path d="M88 92 A59 59 0 0 1 118 40" stroke="#e64a19" stroke-width="2.4" fill="none" stroke-dasharray="5 4"/>' +
        '<circle cx="118" cy="92" r="4.5" fill="#e64a19"/><text x="112" y="112" font-size="13" fill="#e64a19">√2</text>';
    } else if (/ch07/.test(chapterId)) {
      art = '<path d="M100 18 L100 116 M28 76 L184 76" stroke="#475569" stroke-width="2.6"/>' +
        '<path d="M96 22 L100 14 L104 22 M178 72 L186 76 L178 80" stroke="#475569" stroke-width="2.4" fill="none"/>' +
        '<circle cx="138" cy="46" r="5" fill="#2563eb"/><text x="146" y="42" font-size="12" fill="#2563eb">(3,2)</text>' +
        '<circle cx="66" cy="98" r="5" fill="#e64a19"/>';
    } else if (/ch08/.test(chapterId)) {
      art = '<path d="M30 108 L164 30" stroke="#2563eb" stroke-width="3"/>' +
        '<path d="M30 44 L170 100" stroke="#16a34a" stroke-width="3"/>' +
        '<circle cx="99" cy="68" r="6.5" fill="#e64a19"/>' +
        '<circle cx="99" cy="68" r="12" fill="none" stroke="#e64a19" stroke-width="1.6" opacity=".55"/>';
    } else if (/ch10/.test(chapterId)) {
      art = '<path d="M32 108 L176 108 M32 108 L32 24" stroke="#475569" stroke-width="2.4"/>' +
        '<rect x="48" y="62" width="24" height="46" fill="#60a5fa"/>' +
        '<rect x="84" y="40" width="24" height="68" fill="#34d399"/>' +
        '<rect x="120" y="76" width="24" height="32" fill="#fbbf24"/>' +
        '<path d="M48 56 L96 32 L132 68 L164 44" stroke="#e64a19" stroke-width="2.4" fill="none"/>';
    } else if (/ch01/.test(chapterId)) {
      art = '<circle cx="82" cy="66" r="36" fill="#60a5fa" opacity=".45"/>' +
        '<circle cx="122" cy="66" r="36" fill="#f472b6" opacity=".45"/>' +
        '<text x="66" y="72" font-size="15" fill="#1e3a8a">A</text>' +
        '<text x="128" y="72" font-size="15" fill="#831843">B</text>';
    } else {
      art = '<path d="M30 104 C 70 100, 88 72, 100 48 C 110 30, 122 22, 168 18" stroke="#7e22ce" stroke-width="3.2" fill="none"/>' +
        '<path d="M30 96 L170 96 M42 108 L42 26" stroke="#94a3b8" stroke-width="2"/>';
    }
    return head + art + '</svg>';
  }

  /* ---------- 图标 ---------- */
  var ICO = {
    stagePrimary: '<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3 L2 8 L12 13 L22 8 Z M6 10.5 V16 C6 17.5 9 19 12 19 C15 19 18 17.5 18 16 V10.5"/></svg>',
    stageJunior: '<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M8 9 H16 M8 13 H16 M8 17 H12"/></svg>',
    stageSenior: '<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19 L4 6 C4 5 5 4 6 4 L20 4 L20 17 C20 18 19 19 18 19 Z M4 19 C4 20 5 21 6 21 L20 21"/></svg>',
    book: '<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M12 4 V20 M3 9 H21"/></svg>',
    clock: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7 V12 L15.5 14"/></svg>',
    play: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="3"/><path d="M10 9.5 L15 12 L10 14.5 Z" fill="currentColor"/></svg>',
    user: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8.5" r="4"/><path d="M4.5 20 C5.5 16 8.5 14.5 12 14.5 C15.5 14.5 18.5 16 19.5 20"/></svg>',
    star: '<svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"><path d="M12 3.6 L14.6 9 L20.5 9.8 L16.2 13.9 L17.3 19.8 L12 17 L6.7 19.8 L7.8 13.9 L3.5 9.8 L9.4 9 Z" fill-opacity="0"/></svg>',
    starOn: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3.6 L14.6 9 L20.5 9.8 L16.2 13.9 L17.3 19.8 L12 17 L6.7 19.8 L7.8 13.9 L3.5 9.8 L9.4 9 Z"/></svg>',
    playSolid: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 4.8 L19 12 L7 19.2 Z"/></svg>',
  };

  /* ---------- 渲染：学段 ---------- */
  function renderStages() {
    var html = '';
    html += '<button class="side-btn disabled" title="规划中" tabindex="-1">' + ICO.stagePrimary + '小学<span class="badge">规划中</span></button>';
    var i, st;
    for (i = 0; i < DATA.stages.length; i++) {
      st = DATA.stages[i];
      html += '<button class="side-btn' + (state.stage === st.id ? ' active' : '') + '" data-stage="' + st.id + '">' +
        (st.id === 'junior' ? ICO.stageJunior : ICO.stageSenior) + st.title + '</button>';
    }
    $stage.innerHTML = html;
  }

  /* ---------- 渲染：年级 ---------- */
  function renderBooks() {
    var st = findStage(state.stage);
    var html = '', i, bk, n;
    for (i = 0; i < st.books.length; i++) {
      bk = st.books[i];
      n = bookDone(bk);
      html += '<button class="side-btn' + (state.book === bk.id ? ' active' : '') + '" data-book="' + bk.id + '">' +
        ICO.book + bk.title + (n ? '<span class="badge">' + n + ' 课</span>' : '') + '</button>';
    }
    $book.innerHTML = html;
  }

  /* ---------- 渲染：章节 ---------- */
  function renderChapters() {
    var st = findStage(state.stage);
    var bk = findBook(st, state.book);
    var html = '', i, ch, n;
    if (!bk) { $chap.innerHTML = ''; return; }
    for (i = 0; i < bk.chapters.length; i++) {
      ch = bk.chapters[i];
      n = doneCount(ch);
      html += '<button class="chapter-item' + (state.chapter === ch.id ? ' active' : '') + '" data-ch="' + ch.id + '">' +
        '<span class="num">' + (i + 1) + '</span>' +
        '<span>' + ch.title.replace(/^第\d+章\s*/, '') + '</span>' +
        '<span class="cnt' + (n ? ' some' : '') + '">' + (n ? n + ' 课' : '规划中') + '</span>' +
        '<span class="arrow">›</span></button>';
    }
    $chap.innerHTML = html;
  }

  /* ---------- 渲染：课件卡片 ---------- */
  function minsOf(steps) { return Math.max(10, Math.round(steps * 2)); }

  function lessonCard(l, bk, ch, seed) {
    var steps = stepsOf(l);
    var kind = lessonKind(l.title);
    var done = l.status === 'done';
    var isFav = favs.indexOf(l.id) !== -1;
    var desc = '共 ' + (l.scenes || []).length + ' 个教学环节、' + steps + ' 步动态演示；课堂键盘步进，支持回退与环节跳转，投影零依赖直接开讲。';
    var html = '';
    html += '<article class="lesson-card">';
    html += '<div class="thumb">' + thumbSVG(ch.id, seed) + '</div>';
    html += '<div class="lc-body">';
    html += '<div class="lc-title">' + l.title + '</div>';
    html += '<div class="lc-desc">' + desc + '</div>';
    if (state.q) html += '<div class="lc-from">' + bk.title + ' · ' + ch.title + '</div>';
    html += '<div class="pills">';
    html += '<span class="pill ' + kind.cls + '">' + kind.name + '</span>';
    html += done ? '<span class="pill green">可上课</span>' : '<span class="pill gray">规划中</span>';
    if (steps >= 18) html += '<span class="pill orange">重点</span>';
    html += '</div>';
    html += '<div class="lc-meta">';
    html += '<span>' + ICO.clock + '约 ' + minsOf(steps) + ' 分钟</span>';
    html += '<span>' + ICO.play + steps + ' 个动态演示</span>';
    html += '<span>' + ICO.user + '适用：' + bk.title + '</span>';
    html += '</div></div>';
    html += '<div class="lc-side">';
    html += '<button class="fav-btn' + (isFav ? ' on' : '') + '" data-fav="' + l.id + '" title="收藏">' + (isFav ? ICO.starOn : ICO.star) + '</button>';
    html += done
      ? '<a class="start-btn" href="' + l.path + 'index.html">' + ICO.playSolid + '开始上课</a>'
      : '<span class="start-btn off">' + ICO.playSolid + '规划中</span>';
    html += '</div></article>';
    return html;
  }

  function renderLessons() {
    var html = '', seed = 0, i, j, k;
    if (state.q) {
      var q = state.q.toLowerCase();
      var hits = 0;
      var s, b, c, l, si, bi;
      for (si = 0; si < DATA.stages.length; si++) {
        s = DATA.stages[si];
        for (bi = 0; bi < s.books.length; bi++) {
          b = s.books[bi];
          for (j = 0; j < b.chapters.length; j++) {
            c = b.chapters[j];
            for (k = 0; k < (c.lessons || []).length; k++) {
              l = c.lessons[k];
              if ((l.title + c.title + b.title).toLowerCase().indexOf(q) !== -1) {
                html += lessonCard(l, b, c, seed++);
                hits++;
              }
            }
          }
        }
      }
      $hint.style.display = '';
      $hint.textContent = '共找到 ' + hits + ' 个与「' + state.q + '」相关的课件';
      $less.innerHTML = hits ? html : '<div class="empty">没有找到相关课件，换个关键词试试</div>';
      return;
    }
    $hint.style.display = 'none';
    var st = findStage(state.stage);
    var bk = findBook(st, state.book);
    var ch = null;
    if (bk) {
      for (i = 0; i < bk.chapters.length; i++) if (bk.chapters[i].id === state.chapter) ch = bk.chapters[i];
    }
    if (!ch || !(ch.lessons || []).length) {
      $less.innerHTML = '<div class="empty">本章课件正在规划中，敬请期待</div>';
      return;
    }
    for (i = 0; i < ch.lessons.length; i++) html += lessonCard(ch.lessons[i], bk, ch, i);
    $less.innerHTML = html;
  }

  function renderAll() {
    renderStages(); renderBooks(); renderChapters(); renderLessons();
  }

  /* ---------- 默认章节：选中年级里第一个有课的章 ---------- */
  function pickChapter() {
    var st = findStage(state.stage);
    var bk = findBook(st, state.book);
    var i;
    state.chapter = null;
    if (!bk || !bk.chapters.length) return;
    for (i = 0; i < bk.chapters.length; i++) {
      if (doneCount(bk.chapters[i])) { state.chapter = bk.chapters[i].id; return; }
    }
    state.chapter = bk.chapters[0].id;
  }

  /* ---------- 事件 ---------- */
  $stage.addEventListener('click', function (e) {
    var btn = e.target.closest('[data-stage]');
    if (!btn) return;
    state.stage = btn.getAttribute('data-stage');
    var st = findStage(state.stage);
    state.book = st.books[0].id;
    if (state.stage === 'junior') state.book = 'grade7b';
    pickChapter(); state.q = ''; $q.value = '';
    renderAll();
  });
  $book.addEventListener('click', function (e) {
    var btn = e.target.closest('[data-book]');
    if (!btn) return;
    state.book = btn.getAttribute('data-book');
    pickChapter(); state.q = ''; $q.value = '';
    renderAll();
  });
  $chap.addEventListener('click', function (e) {
    var btn = e.target.closest('[data-ch]');
    if (!btn) return;
    state.chapter = btn.getAttribute('data-ch');
    state.q = ''; $q.value = '';
    renderChapters(); renderLessons();
  });
  $less.addEventListener('click', function (e) {
    var fav = e.target.closest('[data-fav]');
    if (!fav) return;
    var id = fav.getAttribute('data-fav');
    var idx = favs.indexOf(id);
    if (idx === -1) favs.push(id); else favs.splice(idx, 1);
    try { localStorage.setItem(FKEY, JSON.stringify(favs)); } catch (err) { /* 隐私模式忽略 */ }
    renderLessons();
  });
  $q.addEventListener('input', function () {
    state.q = $q.value.trim();
    renderLessons();
  });

  /* ---------- 启动 ---------- */
  pickChapter();
  renderAll();
})();
</script>
</body>
</html>
